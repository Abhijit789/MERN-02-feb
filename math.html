<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Math Object :: It is used to perform mathematical operations in js.
        let pi=Math.PI
        console.log(pi);

        // random():to get a random number

        let random=Math.random();
        console.log(random);

        // round(): to get rounded value

        let round=Math.round(13.51)
        console.log(round);

        // abs():It is used to conver negative integer to positive integer

        let abs=Math.abs(-12)
        console.log(abs);


        // ceil():It is used to get upper limit 

        let ceil=Math.ceil(12.23)
        console.log(ceil);

        // floor():Its is used to get lower limit

        let floor=Math.floor(13.52)
        console.log(floor);


        // pow():To get the power of base value

        let power=Math.pow(5,2)
        console.log(power);

        // min():It is used to find out min number

        let min=Math.min(23,-23,28,22,-0)
        console.log(min);

        // max():It is used to find out max number

        let max=Math.max(12,1,0,122,45)
        console.log(max);

        // sqrt():It is used to get a square root of a number

        let sqrt=Math.sqrt(64)
        console.log(sqrt);


        function getOTP(){
            let random=Math.random();
            return Math.round(random*10000)
        }

        console.log(getOTP());


        
        
        
        
        
        
        
        
        
        
        
        
    </script>
</body>
</html>
