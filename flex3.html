<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
        }
        nav{
            width: 100%;
            padding: 50px 25px;
            background-color:black;
        }
        nav ul{
            list-style:none;
            display: flex;
            justify-content: end;
            column-gap: 20px;
        }
        nav ul a{
            display: inline-block;
            color:white;
            text-decoration: none;
            padding: 20px 18px;
            background-color:black;
            border-radius: 10px;
            box-shadow: 0px 0px 5px white ;
        }
        a:hover{
            box-shadow: 0px 0px 5px red,0px 0px 10px red,0px 0px 15px red;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#">HOME</a></li>
            <li><a href="#">CONTACT</a></li>
            <li><a href="#">ABOUT</a></li>
        </ul>
    </nav>
</body>
</html>
